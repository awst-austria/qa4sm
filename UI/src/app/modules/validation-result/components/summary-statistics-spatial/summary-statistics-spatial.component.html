<div class="flex flex-column w-12 mx-0">
  <p-panel [toggleable]="true" [collapsed]="true">
    <ng-template pTemplate="header">
      <div class="text-center my-1" style="width: 92%">
        <span class="my-0 font-weight-normal">Spatial Validation Summary Statistics</span>
      </div>
    </ng-template>
    <ng-template pTemplate="icons">
      <label class="p-panel-header-icon mb-0"
             pTooltip="Statistics of the spatial validation results."
             tooltipPosition="bottom">
        <span class="pi pi-question-circle help-icon"></span>
      </label>
    </ng-template>

    <div *ngIf="(table$ | async) as table; else noTable" class="pb-3">
      <ng-template [ngIf]="table === 'error file size'" [ngIfElse]="showTable">
        This validation has resulted in a file whose size exceeds the maximum limit.
      </ng-template>
      <ng-template #showTable>
        <span [innerHtml]="table" class="lg:text-base text-sm"></span>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <button pButton
                  type="button"
                  icon="pi pi-download"
                  label="Download statistics .zip"
                  class="btn-action-large"
                  pTooltip="Download spatial statistics"
                  [life]="globals.tooltipLifetime"
                  (click)="getSummaryStatisticsAsCsv()">
          </button>
        </div>
      </ng-template>
    </div>

    <ng-template #noTable>
      <p class="lead text-muted">
        We could not fetch spatial statistics. Please try again later.
      </p>
    </ng-template>
  </p-panel>
</div>
