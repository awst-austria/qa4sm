<p-panel header="Spatial Validation Results" [toggleable]="true">
  <div class="flex flex-column gap-3 p-3">
    <p class="text-muted m-0">
      Download the spatial validation results. The NetCDF file contains the computed metrics,
      the graphs contain all generated plots, and the statistics contains
      summary CSV files.
    </p>
    
    <div class="flex flex-row gap-2 flex-wrap">
      <button pButton
              type="button"
              label="Download NetCDF"
              icon="pi pi-download"
              (click)="downloadSpatialNetCDF()">
      </button>
      <button pButton
              type="button"
              label="Download Graphs"
              icon="pi pi-download"
              class="p-button-secondary"
              (click)="downloadSpatialGraphics()">
      </button>
      <button pButton
              type="button"
              label="Download Statistics"
              icon="pi pi-download"
              class="p-button-secondary"
              (click)="downloadSpatialStatistics()">
      </button>
    </div>

  </div>
</p-panel>
